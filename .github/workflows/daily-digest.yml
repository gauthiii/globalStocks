name: Daily P/L Digest

# Sends the watchlist P/L summary to Telegram once a day.
# GitHub cron is in UTC: 03:30 UTC = 09:00 AM IST.
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Send digest
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python digest.py
