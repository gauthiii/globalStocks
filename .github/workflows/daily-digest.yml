name: Daily P/L Digest

# Sends the watchlist P/L summary to Telegram on a schedule.
# GitHub cron is in UTC (IST = UTC+5:30). Times below are mapped in the run step:
#   India digests:  08:30 IST=03:00, 09:00 IST=03:30, 13:00 IST=07:30 UTC
#   US digests:     17:30 IST=12:00, 18:30 IST=13:00, 00:00 IST=18:30 UTC
on:
  schedule:
    - cron: "0 3 * * *"    # 08:30 IST — India
    - cron: "30 3 * * *"   # 09:00 IST — India
    - cron: "30 7 * * *"   # 13:00 IST — India
    - cron: "0 12 * * *"   # 17:30 IST — US
    - cron: "0 13 * * *"   # 18:30 IST — US
    - cron: "30 18 * * *"  # 00:00 IST — US
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Send digest
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          case "$SCHEDULE" in
            "0 3 * * *"|"30 3 * * *"|"30 7 * * *") MARKET=india ;;
            "0 12 * * *"|"0 13 * * *"|"30 18 * * *") MARKET=us ;;
            *) MARKET=all ;;  # manual run (workflow_dispatch) -> both markets
          esac
          echo "Schedule='$SCHEDULE' -> market=$MARKET"
          python digest.py --market "$MARKET"
